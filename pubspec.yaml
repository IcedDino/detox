name: detox
description: Detox app MVP with real Android usage tracking.
publish_to: 'none'
version: 1.1.1+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  flutter_localizations:
    sdk: flutter
  app_usage: ^4.0.0
  fl_chart: ^0.69.0
  intl: ^0.20.2
  android_intent_plus: ^5.3.1
  installed_apps: ^2.1.1
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_local_notifications: ^17.2.4
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  firebase_messaging: ^15.2.10
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.5
  google_mobile_ads: ^5.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/Logo_detox.png
  adaptive_icon_foreground: assets/images/Logo_detox.png
  adaptive_icon_background: '#0F172A'
