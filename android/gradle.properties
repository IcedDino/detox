org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.newDsl=false

# Kotlin incremental compilation disabled intentionally to avoid Windows multi-drive cache crashes.
kotlin.incremental=false
kotlin.caching.enabled=false
org.gradle.caching=true
kotlin.compiler.execution.strategy=in-process
kotlin.incremental.useClasspathSnapshot=false
